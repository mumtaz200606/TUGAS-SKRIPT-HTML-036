<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Header */
        .header {
            background-color: #d1ff05;
            padding: 20px;
            text-align: center;
        }

        /* Kolom */
        .column {
            float: left;
            width: 33.33%;
            /* 3 kolom */
            padding: 20px;
            height: 150px;
            /* tinggi contoh */
        }

        /* Footer */
        .footer {
            background-color: #0f95d3;
            padding: 10px;
            text-align: center;
            clear: both;
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>Header</h2>
    </div>

    <!-- Baris 1 -->
    <div class="column" style="background-color:#19e612;">
        <p>Kolom 1 - Baris 1</p>
    </div>
    <div class="column" style="background-color:#e708c9;">
        <p>Kolom 2 - Baris 1</p>
    </div>
    <div class="column" style="background-color:#6406fc;">
        <p>Kolom 3 - Baris 1</p>
    </div>

    <!-- Baris 2 -->
    <div class="column" style="background-color:#f33c05;">
        <p>Kolom 1 - Baris 2</p>
    </div>
    <div class="column" style="background-color:#08e0f0;">
        <p>Kolom 2 - Baris 2</p>
    </div>
    <div class="column" style="background-color:#e4dde2;">
        <p>Kolom 3 - Baris 2</p>
    </div>

    <div class="footer">
        <p>Footer</p>
    </div>

</body>

</html>
